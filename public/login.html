<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ethara AI - Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    background:#071b3b;

    overflow-x:hidden;
    overflow-y:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:80px 15px 40px;

    position:relative;
}

/* Grid Background */

body::before{

    content:'';

    position:absolute;
    inset:0;

    background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

    background-size:80px 40px;
}

/* Lamp */

.top-lamp{

    position:absolute;

    top:0;

    width:140px;
    height:30px;

    background:#111;

    border-radius:0 0 15px 15px;

    z-index:10;
}

/* Light */

.top-light{

    position:absolute;

    top:20px;

    width:90%;
    max-width:700px;

    height:320px;

    left:50%;
    transform:translateX(-50%);

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.95),
        rgba(255,255,255,0.25),
        rgba(255,255,255,0)
    );

    clip-path:polygon(
        38% 0%,
        62% 0%,
        100% 100%,
        0% 100%
    );

    filter:blur(18px);

    opacity:0.9;

    z-index:1;
}

/* Login Box */

.container{

    width:100%;
    max-width:450px;

    padding:42px 32px;

    border-radius:28px;

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.15);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    box-shadow:0 10px 35px rgba(0,0,0,0.35);

    color:#fff;

    position:relative;

    z-index:20;
}

/* Title */

.container h1{

    text-align:center;

    font-size:40px;

    margin-bottom:10px;
}

.subtitle{

    text-align:center;

    color:#d6d6d6;

    margin-bottom:28px;

    font-size:15px;
}

/* Input */

.input-box{

    width:100%;

    height:56px;

    margin:18px 0;

    position:relative;
}

.input-box input{

    width:100%;
    height:100%;

    background:transparent;

    border:2px solid rgba(255,255,255,0.2);

    border-radius:40px;

    outline:none;

    color:#fff;

    font-size:15px;

    padding:0 55px 0 22px;
}

.input-box input::placeholder{

    color:#f1f1f1;
}

.input-box i{

    position:absolute;

    right:22px;

    top:50%;

    transform:translateY(-50%);

    color:#fff;

    font-size:18px;
}

/* Button */

.btn{

    width:100%;

    height:54px;

    margin-top:10px;

    border:none;

    border-radius:40px;

    background:#fff;

    color:#111;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.btn:hover{

    background:#ececec;

    transform:translateY(-3px);
}

/* Signup Link */

.signup-link{

    text-align:center;

    margin-top:22px;

    font-size:15px;
}

.signup-link a{

    color:#fff;

    font-weight:600;

    text-decoration:none;
}

.signup-link a:hover{

    text-decoration:underline;
}

/* Mobile */

@media(max-width:480px){

    body{

        align-items:flex-start;

        padding:90px 14px 40px;
    }

    .container{

        padding:35px 18px;

        border-radius:22px;
    }

    .container h1{

        font-size:32px;
    }

    .subtitle{

        font-size:14px;

        margin-bottom:22px;
    }

    .input-box{

        height:52px;

        margin:15px 0;
    }

    .input-box input{

        font-size:14px;
    }

    .btn{

        height:50px;

        font-size:16px;
    }

    .signup-link{

        font-size:14px;
    }

    .top-light{

        height:240px;
    }
}

</style>
</head>

<body>

<div class="top-light"></div>

<div class="top-lamp"></div>

<div class="container">

    <!-- Login Form -->
    <form action="/login-data" method="POST">

        <h1>Login</h1>

        <p class="subtitle">
            Welcome back to Ethara AI
        </p>

        <!-- Email -->
        <div class="input-box">

            <input 
            type="email"
            name="email"
            placeholder="Email Address"
            required>

            <i class="fa-solid fa-envelope"></i>

        </div>

        <!-- Password -->
        <div class="input-box">

            <input 
            type="password"
            name="password"
            placeholder="Password"
            required>

            <i class="fa-solid fa-lock"></i>

        </div>

        <!-- Button -->
        <button type="submit" class="btn">

            Login

        </button>

        <!-- Signup Link -->
        <div class="signup-link">
            Don't have an account?
            <a href="/signup">Sign Up</a>

        </div>

    </form>

</div>

</body>
</html>
