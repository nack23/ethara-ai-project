<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Login UI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b2c5f;
    overflow-y:auto;
    padding:40px 15px;
    position:relative;
}

/* Brick Wall Background */

body::before{
    content:'';
    position:absolute;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:80px 40px;
    opacity:0.18;
}

/* Lamp */

.top-lamp{
    position:absolute;
    top:0;
    width:130px;
    height:28px;
    background:#111;
    border-radius:0 0 12px 12px;
    z-index:5;
    box-shadow:0 6px 10px rgba(0,0,0,0.5);
}

/* Wide Light Effect */

.top-light{
    position:absolute;
    top:15px;
    width:650px;
    max-width:95%;
    height:350px;
    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.95),
        rgba(255,255,255,0.25),
        rgba(255,255,255,0)
    );

    clip-path:polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);

    filter:blur(18px);
    opacity:0.9;
    z-index:1;
}

/* Login Container */

.container{
    width:420px;
    max-width:100%;
    padding:40px 35px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    color:#fff;
    position:relative;
    z-index:10;
}

.container h1{
    text-align:center;
    font-size:42px;
    margin-bottom:35px;
    font-weight:700;
}

/* Input */

.input-box{
    width:100%;
    height:58px;
    margin:22px 0;
    position:relative;
}

.input-box input{
    width:100%;
    height:100%;
    background:transparent;
    border:2px solid rgba(255,255,255,0.22);
    border-radius:40px;
    outline:none;
    color:#fff;
    font-size:16px;
    padding:0 55px 0 22px;
}

.input-box input::placeholder{
    color:#f5f5f5;
}

.input-box i{
    position:absolute;
    right:22px;
    top:50%;
    transform:translateY(-50%);
    font-size:18px;
    color:#fff;
}

/* Remember */

.remember-forgot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin:10px 0 25px;
    font-size:14px;
}

.remember-forgot a{
    color:#fff;
    text-decoration:none;
}

.remember-forgot a:hover{
    text-decoration:underline;
}

/* Button */

.btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:40px;
    background:#fff;
    color:#111;
    font-size:20px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#f0f0f0;
    transform:translateY(-2px);
}

/* Register */

.register-link{
    text-align:center;
    margin-top:25px;
    font-size:15px;
}

.register-link a{
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

.register-link a:hover{
    text-decoration:underline;
}

/* Mobile */

@media(max-width:500px){

    body{
        align-items:flex-start;
        padding-top:90px;
        padding-bottom:40px;
    }

    .top-light{
        width:100%;
        height:280px;
        clip-path:polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
    }

    .container{
        padding:30px 20px;
        border-radius:20px;
    }

    .container h1{
        font-size:32px;
        margin-bottom:25px;
    }

    .input-box{
        height:52px;
        margin:18px 0;
    }

    .input-box input{
        font-size:15px;
    }

    .btn{
        height:50px;
        font-size:18px;
    }

    .remember-forgot{
        font-size:13px;
    }

    .register-link{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="top-light"></div>
<div class="top-lamp"></div>

<div class="container">

    <form>

        <h1>Login</h1>

        <div class="input-box">
            <input type="text" placeholder="Username" required>
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
        </div>

        <div class="remember-forgot">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="register-link">
            <p>Don't have an account?
            <a href="#">Register</a></p>
        </div>

    </form>

</div>

</body>
</html>
